<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IPGG - Rede de Suporte ao Idoso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--card:#1c2128;--hover:#21262d;
  --b:#30363d;--bhi:#58a6ff;
  --t:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --ac:#58a6ff;--acbg:rgba(88,166,255,.08);
  --green:#3fb950;--amber:#d29922;--red:#f85149;--purple:#bc8cff;
  --r:8px;--font:'DM Sans',sans-serif
}
body{background:var(--bg);color:var(--t);font-family:var(--font);font-size:16px;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
/* TOPBAR */
#topbar{background:var(--panel);border-bottom:1px solid var(--b);display:flex;flex-direction:column;padding:0;flex-shrink:0}
#topbar-title{height:72px;display:flex;align-items:center;padding:0 24px;gap:14px;border-bottom:1px solid var(--b);position:relative}
#topbar-search{height:46px;display:flex;align-items:center;padding:0 24px;gap:12px;justify-content:center}
#topbar .logo{width:48px;height:48px;background:linear-gradient(135deg,#1f6feb,#388bfd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
#topbar .brand{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center}
#topbar .brand b{font-size:22px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
#topbar .brand small{font-size:14px;color:var(--t2);letter-spacing:.8px;text-transform:uppercase}
#topbar .sep{width:1px;height:24px;background:var(--b);flex-shrink:0}
#addrWrap{position:relative;flex-shrink:0}
#addrWrap span{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
#addrIn{width:480px;padding:9px 12px 9px 34px;background:var(--bg);border:1px solid var(--b);border-radius:var(--r);color:var(--t);font-family:var(--font);font-size:15px;outline:none}
#addrIn:focus{border-color:var(--bhi)}
#addrIn::placeholder{color:var(--t3);text-transform:uppercase;font-size:13px;letter-spacing:.3px}
#buscarBtn{padding:9px 20px;background:#1f6feb;border:none;border-radius:var(--r);color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;letter-spacing:.5px;text-transform:uppercase}
#buscarBtn:hover{background:#388bfd}
#buscarBtn:disabled{opacity:.5;cursor:wait}
#addrMsg{font-size:13px;flex-shrink:0;max-width:240px}
#addrMsg.ok{color:var(--green)}
#addrMsg.err{color:var(--red)}
#chips{display:flex;gap:5px;flex-shrink:0}
.chip{font-size:15px;color:var(--t2);background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:5px 12px}
.chip b{color:var(--ac)}
#backIpggBtn{font-size:14px;font-weight:600;color:var(--ac);background:var(--acbg);border:1px solid rgba(88,166,255,.3);border-radius:6px;padding:7px 14px;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .15s,border-color .15s}
#backIpggBtn:hover{background:rgba(88,166,255,.16);border-color:var(--bhi)}
/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
#sidebar{width:540px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow-y:auto}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.sb{padding:7px 10px;border-bottom:1px solid var(--b)}
.sblbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:5px}
/* TYPE BUTTONS */
.tbtn{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:5px;border:none;background:transparent;color:var(--t2);font-family:var(--font);font-size:14px;cursor:pointer;text-align:left;width:100%}
.tbtn:hover{background:var(--hover);color:var(--t)}
.tbtn.on{background:var(--acbg);color:var(--ac)}
.tbtn .tico{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.tbtn .tnm{flex:1;text-transform:uppercase;letter-spacing:.3px}
.tbtn .tn{font-size:11px;color:var(--t3);background:var(--bg);border-radius:3px;padding:1px 5px}
.tbtn.on .tn{color:var(--ac);background:var(--acbg)}
#tfilt{display:grid;grid-template-columns:1fr 1fr;gap:2px}
/* SERV */
#servWrap{position:relative;display:flex;align-items:center;gap:4px;flex-shrink:0}
#servIn{flex:1;width:360px;padding:9px 12px 9px 30px;background:var(--bg);border:1px solid var(--b);border-radius:var(--r);color:var(--t);font-family:var(--font);font-size:15px;outline:none}
#servIn:focus{border-color:var(--bhi)}
#servIn::placeholder{color:var(--t3);text-transform:uppercase;font-size:13px;letter-spacing:.3px}
#servIco{position:absolute;left:8px;font-size:11px;pointer-events:none}
#sdrop{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--card);border:1px solid var(--b);border-radius:var(--r);max-height:190px;overflow-y:auto;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.5)}
#sdrop.open{display:block}
.sopt{padding:10px 12px;font-size:15px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(48,54,61,.5)}
.sopt:last-child{border-bottom:none}
.sopt:hover,.sopt.hi{background:var(--hover);color:var(--t)}
.sopt mark{background:rgba(88,166,255,.2);color:var(--ac);border-radius:2px;padding:0 2px;font-style:normal}
.soptc{margin-left:auto;font-size:13px;color:var(--t3)}
#stag{display:none;margin-top:0;align-items:center;gap:5px;background:var(--acbg);border:1px solid rgba(88,166,255,.3);border-radius:var(--r);padding:4px 10px;font-size:12px;color:var(--ac);white-space:nowrap;flex-shrink:0}
#stag.on{display:flex}
#stagX{margin-left:auto;background:none;border:none;color:var(--ac);cursor:pointer;font-size:11px;opacity:.7}
/* REGION */

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

#rc{font-size:12px;color:var(--t2)}
#rc b{color:var(--ac)}
#rscroll{flex:1;overflow:hidden;padding:4px 14px 12px;display:flex;flex-direction:column}
#rscroll::-webkit-scrollbar{width:4px}
#rscroll::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
#grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:9px;
  flex:1;
  min-height:0;
}
/* CARD */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:16px 18px;position:relative;display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0;justify-content:space-between}
.card:hover{border-color:#484f58}
.card.cl{border-color:var(--ac)}
.cbadge{display:none;position:absolute;top:0;right:0;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 8px;background:var(--ac);color:#fff;border-bottom-left-radius:6px}
.card.cl .cbadge{display:block}
.ctop{display:flex;align-items:center;gap:10px}
.cico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cinf{flex:1;min-width:0}
.cmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.ctipo{font-size:13px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.cdist{font-size:15px;color:var(--amber)}
.cnome{font-size:clamp(15px,1.4vw,20px);font-weight:700;line-height:1.3;white-space:normal;overflow:visible;text-overflow:unset}
.cend{font-size:clamp(13px,1.1vw,16px);color:var(--t2);margin-top:2px;white-space:normal;overflow:visible;text-overflow:unset}
.creg{font-size:clamp(13px,1vw,15px);color:var(--purple);font-weight:500}
.chr{font-size:clamp(13px,1vw,15px);color:var(--t2)}
.cservs{font-size:clamp(12px,1vw,15px);color:var(--t3);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.cacts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cacts a,.cacts button{padding:8px 10px;border-radius:6px;font-size:clamp(11px,0.9vw,13px);font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid var(--b);background:var(--bg);color:var(--t2);cursor:pointer;font-family:var(--font);white-space:nowrap;width:100%}
.cacts a:hover,.cacts button:hover{border-color:var(--bhi);color:var(--t)}
.cacts .cfull{grid-column:1/-1}
.br{border-color:rgba(31,111,235,.4)!important;color:#388bfd!important}
.bp{border-color:rgba(63,185,80,.4)!important;color:var(--green)!important}
.bs{border-color:rgba(37,211,102,.3)!important;color:#25d366!important}
.bd{border-color:rgba(188,140,255,.3)!important;color:var(--purple)!important}
/* PAGINATION */
#pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;}
.pbtn{padding:7px 16px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);color:var(--t2);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer}
.pbtn:hover:not(:disabled){border-color:var(--bhi);color:var(--ac)}
.pbtn:disabled{opacity:.3;cursor:not-allowed}
#pinfo{font-size:14px;color:var(--t2);min-width:60px;text-align:center}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--t3);text-align:center;grid-column:1/-1}
.empty .eic{font-size:30px;margin-bottom:9px}
.empty h3{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:4px}
.empty p{font-size:13px;line-height:1.5}
/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;overflow-y:auto;padding:40px 20px;backdrop-filter:blur(4px)}
#ov.on{display:flex;align-items:flex-start;justify-content:center}
#modal{width:100%;max-width:560px;background:var(--card);border:1px solid var(--b);border-radius:9px;overflow:hidden}
#mh{padding:15px 18px;border-bottom:1px solid var(--b);position:relative}
#mclose{position:absolute;top:11px;right:11px;width:24px;height:24px;background:var(--hover);border:1px solid var(--b);border-radius:5px;color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#mclose:hover{border-color:var(--bhi);color:var(--t)}
#mname{font-size:17px;font-weight:700;padding-right:30px;margin:4px 0 5px}
#mbadges{display:flex;gap:4px;flex-wrap:wrap}
.mbadge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
#mbody{padding:15px 18px;display:flex;flex-direction:column;gap:11px}
.mst{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:4px}
.mrow{display:flex;gap:7px;font-size:13px;color:var(--t2);margin-bottom:3px;line-height:1.5}
.mlbl{color:var(--t3);min-width:65px;font-size:11px}
.mtags{display:flex;flex-wrap:wrap;gap:3px}
.mtag{font-size:12px;padding:2px 6px;border-radius:3px;background:var(--hover);border:1px solid var(--b);color:var(--t2)}
.mtag.hi{background:var(--acbg);border-color:rgba(88,166,255,.3);color:var(--ac)}
#mfoot{padding:11px 18px;border-top:1px solid var(--b);display:flex;gap:5px;flex-wrap:wrap}
#mfoot a{padding:6px 13px;border-radius:var(--r);font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--b)}
#mfoot a:hover{filter:brightness(1.2)}

#addrDrop{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:#1c2128;border:1px solid #30363d;border-radius:8px;max-height:220px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#addrDrop.open{display:block}
.aopt{padding:8px 12px;font-size:13px;color:#8b949e;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(48,54,61,.5)}
.aopt:last-child{border-bottom:none}
.aopt:hover,.aopt.hi{background:#21262d;color:#e6edf3}
.aopt mark{background:rgba(88,166,255,.2);color:#58a6ff;border-radius:2px;padding:0 2px;font-style:normal}
</style>
</head>

function norm(s){
  return s.toLowerCase()
    .replace(/[\u00e0\u00e1\u00e2\u00e3\u00e4]/g,"a")
    .replace(/[\u00e8\u00e9\u00ea\u00eb]/g,"e")
    .replace(/[\u00ec\u00ed\u00ee\u00ef]/g,"i")
    .replace(/[\u00f2\u00f3\u00f4\u00f5\u00f6]/g,"o")
    .replace(/[\u00f9\u00fa\u00fb\u00fc]/g,"u")
    .replace(/\u00e7/g,"c").replace(/\u00f1/g,"n").trim();
}

function dK(a,b,c,d){
  var R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
  var z=Math.sin(x/2)*Math.sin(x/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)*Math.sin(y/2);
  return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));
}

  document.getElementById("addrDrop").classList.remove("open");
  uC=BAIRROS[b];

function onAddrKey(e){
  var dd=document.getElementById("addrDrop");
  var opts=dd.querySelectorAll(".aopt");
  if(!dd.classList.contains("open")) return;
  if(e.key==="ArrowDown"){e.preventDefault();_addrIdx=Math.min(_addrIdx+1,opts.length-1);opts.forEach(function(o,i){o.classList.toggle("hi",i===_addrIdx);});}
  else if(e.key==="ArrowUp"){e.preventDefault();_addrIdx=Math.max(_addrIdx-1,-1);opts.forEach(function(o,i){o.classList.toggle("hi",i===_addrIdx);});}
  else if(e.key==="Enter"&&_addrIdx>=0){e.preventDefault();selectAddr(opts[_addrIdx].dataset.v);}
  else if(e.key==="Escape"){dd.classList.remove("open");}
}


function buscar(){
  var q=document.getElementById("addrIn").value.trim();
  if(!q) return;
  document.getElementById("buscarBtn").disabled=true;
  document.getElementById("buscarBtn").textContent="...";
  setMsg("","");
  var ql=norm(q);
  for(var b in BAIRROS){
    var bl=norm(b);
    if(ql===bl||ql.indexOf(bl)>=0||bl.indexOf(ql)>=0){
      uC=BAIRROS[b];
      setMsg("\u2713 "+b,"addr-msg ok");
      document.getElementById("buscarBtn").disabled=false;
      document.getElementById("buscarBtn").textContent="Buscar";
      calcDist(); return;
    }
  }
  if(/^\d{5}-?\d{3}$/.test(q)){
    var cep=q.replace(/\D/g,"");
    fetch("https://viacep.com.br/ws/"+cep+"/json/")
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.erro) throw new Error("CEP nao encontrado");
        var ql2=norm(d.bairro||"");
        for(var b in BAIRROS){
          if(norm(b)===ql2||ql2.indexOf(norm(b))>=0){
            uC=BAIRROS[b]; setMsg("\u2713 CEP "+cep+" - "+(d.bairro||d.localidade),"addr-msg ok");
            document.getElementById("buscarBtn").disabled=false;
            document.getElementById("buscarBtn").textContent="Buscar";
            calcDist(); return;
          }
        }
        geocode((d.logradouro?d.logradouro+", ":"")+d.bairro+", "+d.localidade+" SP","CEP "+cep);
      })
      .catch(function(e){ setMsg(e.message||"CEP invalido","addr-msg err"); resetBtn(); });
    return;
  }
  geocode(q+" Sao Paulo SP Brasil",q);
}

function geocode(q,label){
  var url="https://photon.komoot.io/api/?q="+encodeURIComponent(q+" Sao Paulo Brazil")+"&limit=1&lang=pt";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||!d.features||!d.features.length) throw new Error();
      var coords=d.features[0].geometry.coordinates;
      uC={lat:coords[1],lng:coords[0]};
      var props=d.features[0].properties;
      var name=props.street||(props.name||label);
      setMsg("\u2713 "+name,"addr-msg ok");
      resetBtn(); calcDist();
    })
    .catch(function(){ setMsg("Nao encontrado. Tente o nome do bairro.","addr-msg err"); resetBtn(); });
}

function resetBtn(){ document.getElementById("buscarBtn").disabled=false; document.getElementById("buscarBtn").textContent="Buscar"; }

function calcDist(){
  tR=P.map(function(p,i){ return {nome:p.nome,end:p.end,tipo:p.tipo,reg:p.reg,hr:p.hr,tel:p.tel,lat:p.lat,lng:p.lng,serv:p.serv,apoio:p.apoio,conv:p.conv,inst:p.inst,extra:p.extra,cep:p.cep,_idx:i,dist:dK(uC.lat,uC.lng,p.lat,p.lng)}; });
  tR.sort(function(a,b){return a.dist-b.dist;});
  fT="Todos"; fS=""; pag=1;
  renderAll(); render();
}

function getBase(){
  if(!tR) return [];
  return tR;
}

function getFilt(){
  var l=getBase();
  if(fT!=="Todos") l=l.filter(function(r){return r.tipo===fT;});
  if(fS) l=l.filter(function(r){return (r.serv||[]).indexOf(fS)>=0;});
  return l;
}

function renderAll(){ renderTypes(); renderServs(); updStats();
// Aviso se chave nao configurada
if(!LOCATIONIQ_KEY){
  var msg=document.getElementById("addrMsg");
  msg.textContent="Busca por bairro ativa. Para ruas: configure LOCATIONIQ_KEY no codigo.";
  msg.className="addr-msg";
  msg.style.color="#484f58";
  msg.style.fontSize="11px";
} }

function renderTypes(){
  var base=getBase();
  var types=["Todos"];
  P.forEach(function(p){if(types.indexOf(p.tipo)<0) types.push(p.tipo);});
  var h="";
  types.forEach(function(t){
    var on=fT===t, c=COR[t]||"#58a6ff", ic=ICO[t]||"&#x1F4CD;";
    var n=t==="Todos"?base.length:base.filter(function(r){return r.tipo===t;}).length;
    h+='<button class="tbtn'+(on?" on":"")+'" data-t="'+t+'"><span class="tico">'+ic+'<\/span><span class="tnm">'+t+'<\/span><span class="tn">'+n+'<\/span><\/button>';
  });
  document.getElementById("tfilt").innerHTML=h;
  document.getElementById("tfilt").querySelectorAll(".tbtn").forEach(function(btn){
    btn.onclick=function(){ setType(this.dataset.t); };
  });
}

function setType(t){ pag=1; fT=t; fS=""; document.getElementById("servIn").value=""; document.getElementById("stag").classList.remove("on"); document.getElementById("sdrop").classList.remove("open"); renderTypes(); render(); }

function renderServs(){
  var all={};
  (tR||P).forEach(function(p){(p.serv||[]).forEach(function(s){all[s]=1;});});
  _servs=Object.keys(all).sort();
}

function sCounts(q){
  var base=getBase();
  return _servs.filter(function(s){return !q||s.toLowerCase().indexOf(q.toLowerCase())>=0;})
    .map(function(s){return {n:s,c:base.filter(function(r){return (r.serv||[]).indexOf(s)>=0;}).length};})
    .filter(function(x){return x.c>0;}).sort(function(a,b){return b.c-a.c;});
}

function openDrop(){ renderDrop(document.getElementById("servIn").value.trim()); }

function renderDrop(q){
  if(!_servs.length) renderServs();
  var dd=document.getElementById("sdrop");
  var items=sCounts(q).slice(0,30);
  if(!items.length&&q){
    var sin=resolverSin(q);
    if(sin){
      dd.innerHTML='<div class="sopt" data-v="'+sin+'">&#x1F4A1; Encontrado como: <b>'+sin+'<\/b><\/div>';
      dd.classList.add("open");
      dd.querySelector(".sopt").onmousedown=function(e){e.preventDefault();selServ(this.dataset.v);};
    } else {
      dd.innerHTML='<div style="padding:8px;font-size:11px;color:var(--t3);text-align:center">Nenhum resultado para "'+q+'"<\/div>';
      dd.classList.add("open");
      setTimeout(function(){document.getElementById("servIn").value="";},2500);
    }
    return;
  }
  if(!items.length){dd.classList.remove("open");return;}
  var rows="";
  items.forEach(function(it){
    rows+='<div class="sopt" data-v="'+it.n+'"><span>'+it.n+'<\/span><span class="soptc">'+it.c+'<\/span><\/div>';
  });
  dd.innerHTML=rows;
  dd.classList.add("open");
  dd.querySelectorAll(".sopt").forEach(function(el){
    el.onmousedown=function(e){e.preventDefault();selServ(this.dataset.v);};
  });
}

function selServ(val){ fS=val; pag=1; fT="Todos"; document.getElementById("servIn").value=""; document.getElementById("sdrop").classList.remove("open"); document.getElementById("stagTxt").textContent=val; document.getElementById("stag").classList.add("on"); renderTypes(); render(); }
function clearServ(){ fS=""; document.getElementById("servIn").value=""; document.getElementById("sdrop").classList.remove("open"); document.getElementById("stag").classList.remove("on"); pag=1; renderTypes(); render(); }


function render(){
  var l=getFilt(), grid=document.getElementById("grid"), rc=document.getElementById("rc"), pg=document.getElementById("pager");
  if(!l.length){
    var tags=[];
    if(fT!=="Todos") tags.push("Tipo: "+fT);
    if(fS) tags.push("Atendimento: "+fS);
      grid.innerHTML='<div class="empty"><div class="eic">&#x1F50D;<\/div><h3>Nenhum servico encontrado<\/h3><p>'+(tags.length?"Filtros: "+tags.join(" | "):"Sem resultados.")+'<\/p><\/div>';
    rc.innerHTML="0 resultados"; pg.style.display="none"; return;
  }
  var tot=Math.ceil(l.length/PP);
  if(pag>tot) pag=1;
  var ini=(pag-1)*PP, fim=ini+PP, lp=l.slice(ini,fim);
  rc.innerHTML="Mostrando <b>"+(ini+1)+"\u2013"+Math.min(fim,l.length)+"<\/b> de <b>"+l.length+"<\/b> &middot; p&aacute;g <b>"+pag+"/"+tot+"<\/b>";
  var h="";
  lp.forEach(function(p,i){
    var ig=ini+i, c=COR[p.tipo]||"#58a6ff", ic=ICO[p.tipo]||"&#x1F4CD;";
    var cl=ig===0&&fT==="Todos"&&!fS&&p.dist!==null;
    var ds=p.dist!==null?p.dist.toFixed(1)+" km":"";
    var tb=p.tel?'<a class="bp" href="tel:'+p.tel.replace(/\D/g,"")+'">&#x1F4DE; '+p.tel+'<\/a>':"";
    var sp=(p.serv&&p.serv.length)?'<div class="cservs">'+p.serv.slice(0,3).join(" &middot; ")+(p.serv.length>3?" +"+(p.serv.length-3)+" mais":"")+'<\/div>':"";
    var db=(p.serv&&p.serv.length)?'<button class="bd" data-idx="'+p._idx+'">&#x2139;&#xFE0F; Detalhes<\/button>':"";
    var rotaClass='br'+(tb?'':' cfull');
    var enviarClass='bs'+(db?'':' cfull');    h+='<div class="card'+(cl?" cl":"")+'">';
    h+='<div class="cbadge">MAIS PR&Oacute;XIMO<\/div>';
    h+='<div class="ctop"><div class="cico" style="background:'+c+'18">'+ic+'<\/div>';
    h+='<div class="cinf"><div class="cmeta"><span class="ctipo" style="background:'+c+'20;color:'+c+'">'+p.tipo+'<\/span>'+(ds?'<span class="cdist">'+ds+'<\/span>':"")+'<\/div>';
    h+='<div class="cnome" title="'+p.nome+'">'+p.nome+'<\/div>';
    h+='<div class="cend" title="'+p.end+'">'+p.end+'<\/div>';
    h+='<div class="creg">&#x1F4CD; '+p.reg+'<\/div>';
    h+=(p.hr?'<div class="chr">&#x1F550; '+p.hr+'<\/div>':"");
    h+=sp+'<\/div><\/div>';
    h+='<div class="cacts"><a class="'+rotaClass+'" href="'+mkRota(p)+'" target="_blank">&#x1F5FA;&#xFE0F; Rota<\/a>'+tb+'<a class="'+enviarClass+'" href="'+mkWhats(p)+'" target="_blank">&#x1F4F1; Enviar<\/a>'+db+'<\/div>';
    h+='<\/div>';
  });
  grid.innerHTML=h;
  grid.querySelectorAll(".bd").forEach(function(btn){
    btn.onclick=function(){ openModal(parseInt(this.dataset.idx)); };
  });
  if(tot>1){
    pg.style.display="flex";
    document.getElementById("prevBtn").disabled=pag===1;
    document.getElementById("nextBtn").disabled=pag===tot;
    document.getElementById("pinfo").textContent=pag+" / "+tot;
  } else pg.style.display="none";
}

function goPage(n){ pag=n; render(); document.getElementById("rscroll").scrollTop=0; }

function openModal(idx){
  var p=P[idx], c=COR[p.tipo]||"#58a6ff", ic=ICO[p.tipo]||"&#x1F4CD;";
  document.getElementById("mico").innerHTML=ic;
  document.getElementById("mname").textContent=p.nome;
  document.getElementById("mbadges").innerHTML='<span class="mbadge" style="background:'+c+'20;color:'+c+'">'+p.tipo+'<\/span><span class="mbadge" style="background:rgba(188,140,255,.1);color:#bc8cff">'+p.reg+'<\/span>';
  var h='<div><div class="mst">Informa&ccedil;&otilde;es<\/div>';
  h+='<div class="mrow"><span class="mlbl">Endere&ccedil;o<\/span><span>'+p.end+(p.cep?" &mdash; CEP "+p.cep:"")+'<\/span><\/div>';
  if(p.tel) h+='<div class="mrow"><span class="mlbl">Telefone<\/span><a href="tel:'+p.tel.replace(/\D/g,"")+'" style="color:var(--green)">'+p.tel+'<\/a><\/div>';
  if(p.hr) h+='<div class="mrow"><span class="mlbl">Hor&aacute;rio<\/span><span>'+p.hr+'<\/span><\/div>';
  if(uC){ var d=dK(uC.lat,uC.lng,p.lat,p.lng); h+='<div class="mrow"><span class="mlbl">Dist&acirc;ncia<\/span><span style="color:var(--amber)">'+d.toFixed(1)+' km<\/span><\/div>'; }
  h+='<\/div>';
  if(p.serv&&p.serv.length) h+='<div><div class="mst">Servi&ccedil;os<\/div><div class="mtags">'+p.serv.map(function(s){return'<span class="mtag hi">'+s+'<\/span>';}).join("")+'<\/div><\/div>';
  if(p.apoio&&p.apoio.length) h+='<div><div class="mst">Apoio<\/div><div class="mtags">'+p.apoio.map(function(s){return'<span class="mtag">'+s+'<\/span>';}).join("")+'<\/div><\/div>';
  if(p.extra) h+='<div><div class="mst">Extras<\/div><p style="font-size:11px;color:var(--t2);line-height:1.5">'+p.extra+'<\/p><\/div>';
  document.getElementById("mbody").innerHTML=h;
  document.getElementById("mfoot").innerHTML='<a href="'+mkRota(p)+'" target="_blank" style="background:rgba(31,111,235,.1);border-color:rgba(31,111,235,.4);color:#388bfd">&#x1F5FA;&#xFE0F; Rota<\/a>'+(p.tel?'<a href="tel:'+p.tel.replace(/\D/g,"")+'" style="background:rgba(63,185,80,.1);border-color:rgba(63,185,80,.4);color:var(--green)">&#x1F4DE; Ligar<\/a>':"")+'<a href="'+mkWhats(p)+'" target="_blank" style="background:rgba(37,211,102,.08);border-color:rgba(37,211,102,.3);color:#25d366">&#x1F4F1; Compartilhar<\/a>';
  document.getElementById("ov").classList.add("on");
  document.body.style.overflow="hidden";
}

function closeModal(){ document.getElementById("ov").classList.remove("on"); document.body.style.overflow=""; }

function updStats(){
  var s=P.filter(function(p){return ["UBS","AMA/UBS","Hospital","Instituto","CAPS","UPA","CEO","CER","PAI","CAPD"].indexOf(p.tipo)>=0;}).length;
  document.getElementById("chips").innerHTML='<span class="chip"><b>'+P.length+'<\/b> servi&ccedil;os<\/span><span class="chip"><b>'+s+'<\/b> sa&uacute;de<\/span>';
}

// INIT
updStats();
document.getElementById("buscarBtn").onclick=buscar;

var _addrHiIdx=-1;
function _norm2(s){return s.toLowerCase().replace(/[àáâãä]/g,"a").replace(/[éêè]/g,"e").replace(/[íî]/g,"i").replace(/[óôõ]/g,"o").replace(/[úû]/g,"u").replace(/ç/g,"c").trim();}
var _addrTimer=null;
function _addrOnInput(q){
  var dd=document.getElementById("addrDrop");
  if(!q||q.length<2){dd.classList.remove("open");return;}

  // 1. Bairros locais (instantaneo)
  var ql=_norm2(q);
  var hits=[];
  for(var k in BAIRROS){if(_norm2(k).indexOf(ql)>=0)hits.push(k);}
  var localRows=hits.slice(0,4).map(function(k){
    var c=k.split(" ").map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(" ");
    return "<div class='aopt' data-type='bairro' data-k='"+k+"'>&#x1F4CD; "+c+"<\/div>";
  }).join("");
  if(localRows){
    dd.innerHTML=localRows;
    dd.classList.add("open");
    _addrHiIdx=-1;
    _addrBindOpts();
  }

  // 2. LocationIQ para ruas e enderecos completos
  if(!LOCATIONIQ_KEY||q.length<3){return;}
  clearTimeout(_addrTimer);
  _addrTimer=setTimeout(function(){
    var url="https:\/\/us1.locationiq.com\/v1\/autocomplete?key="+LOCATIONIQ_KEY+"&q="+encodeURIComponent(q)+"&limit=8&countrycodes=br&dedupe=1&normalizecity=1&bounded=1&viewbox=-46.826,-23.774,-46.365,-23.357";
    fetch(url)
      .then(function(r){return r.json();})
      .then(function(data){
        if(!data||!data.length) return;
        var apiRows=data.filter(function(r){
          // filtrar so resultados com rua ou nome util
          var a=r.address||{};
          return a.road||a.name||r.display_name;
        }).map(function(r){
          var a=r.address||{};
          var label=a.name||r.display_place||r.display_name.split(",")[0]||"";
          var num=a.house_number?", "+a.house_number:"";
          label=label+num;
          if(!label) return "";
          var bairro=a.suburb||"";
          var sub=bairro||"";
          return "<div class='aopt' data-type='coord' data-lat='"+r.lat+"' data-lng='"+r.lon+"' data-label='"+label.replace(/'/g,"&#39;")+"' data-sub='"+sub.replace(/'/g,"&#39;")+"'>&#x1F4CC; "+label+(sub?"<br><small style='color:#8b949e;font-size:11px;margin-left:18px'> "+sub+"<\/small>":"")+"<\/div>";
        }).filter(Boolean).join("");
        if(apiRows){
          dd.innerHTML=localRows+apiRows;
          dd.classList.add("open");
          _addrHiIdx=-1;
          _addrBindOpts();
        }
      })
      .catch(function(){});
  },350);
}

function _addrBindOpts(){
  var dd=document.getElementById("addrDrop");
  Array.prototype.forEach.call(dd.querySelectorAll(".aopt"),function(el){
    el.onmousedown=function(e){
      e.preventDefault();
      if(this.dataset.type==="coord"){
        uC={lat:parseFloat(this.dataset.lat),lng:parseFloat(this.dataset.lng)};
        var lbl=this.dataset.label;
        var sub=this.dataset.sub||"";
        document.getElementById("addrIn").value=lbl;
        dd.classList.remove("open");
        setMsg("\u2713 "+lbl+(sub?" \u2014 "+sub:""),"addr-msg ok");
        resetBtn();
        calcDist();
      } else {
        _addrPick(this.dataset.k);
      }
    };
  });
}
function _addrPick(k){
  var cap=k.split(" ").map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(" ");
  document.getElementById("addrIn").value=cap;
  document.getElementById("addrDrop").classList.remove("open");
  uC=BAIRROS[k];
  setMsg("\u2713 "+cap,"addr-msg ok");
  calcDist();
}
function _addrOnKey(e){
  var dd=document.getElementById("addrDrop");
  var opts=dd.querySelectorAll(".aopt");
  if(!dd.classList.contains("open")){if(e.key==="Enter")buscar();return;}
  if(e.key==="ArrowDown"){e.preventDefault();_addrHiIdx=Math.min(_addrHiIdx+1,opts.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();_addrHiIdx=Math.max(_addrHiIdx-1,-1);}
  else if(e.key==="Enter"){e.preventDefault();if(_addrHiIdx>=0)_addrPick(opts[_addrHiIdx].dataset.k);else buscar();return;}
  else if(e.key==="Escape"){dd.classList.remove("open");return;}
  Array.prototype.forEach.call(opts,function(o,i){o.classList.toggle("hi",i===_addrHiIdx);});
}
document.addEventListener("click",function(e){
  var w=document.getElementById("addrWrap");
  if(w&&!w.contains(e.target))document.getElementById("addrDrop").classList.remove("open");
});
document.getElementById("addrIn").oninput=function(){_addrOnInput(this.value);};document.getElementById("addrIn").onkeydown=function(e){_addrOnKey(e);};
document.getElementById("servIn").oninput=function(){_di=-1; renderDrop(this.value.trim());};
document.getElementById("servIn").onfocus=function(){openDrop();};
document.getElementById("stagX").onclick=clearServ;
document.getElementById("prevBtn").onclick=function(){goPage(pag-1);};
document.getElementById("nextBtn").onclick=function(){goPage(pag+1);};
document.getElementById("mclose").onclick=closeModal;
document.getElementById("ov").onclick=function(e){if(e.target===this) closeModal();};
document.addEventListener("keydown",function(e){if(e.key==="Escape") closeModal();});
document.addEventListener("click",function(e){
  var w=document.getElementById("servWrap");
  if(w&&!w.contains(e.target)) document.getElementById("sdrop").classList.remove("open");
});

</script>
