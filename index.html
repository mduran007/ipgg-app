<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IPGG Rede">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Encontre serviços de saúde, assistência social e cidadania. Secretaria de Saúde do Estado de São Paulo.">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>IPGG – Rede de Suporte ao Idoso</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-surface: #1e293b;
  --border: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,.15);
  --green: #22c55e;
  --amber: #f59e0b;
  --radius: 14px;
  --radius-sm: 10px;
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  background: linear-gradient(145deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);
  padding: 24px 16px 20px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -60%;
  right: -15%;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(255,255,255,.05) 0%, transparent 65%);
  border-radius: 50%;
}

.header-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
}

.header-brand {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #a5b4fc;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.header-title {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  line-height: 1.25;
}

.header-sub {
  font-size: 14px;
  color: #c4b5fd;
  margin-top: 4px;
}

.header-stats {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat-pill {
  font-size: 13px;
  color: #fde68a;
  background: rgba(253,230,138,.08);
  border: 1px solid rgba(253,230,138,.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-weight: 600;
}

/* CONTAINER */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
}

/* SEARCH BOX */
.search-box {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.gps-btn {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  cursor: pointer;
  min-height: 56px;
  letter-spacing: .3px;
  box-shadow: 0 4px 20px rgba(79,70,229,.3);
  transition: all .2s;
  font-family: var(--font);
}

.gps-btn:active { transform: scale(.97); opacity: .9; }
.gps-btn:disabled { opacity: .5; cursor: wait; }



/* MESSAGES */
.msg {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  display: none;
}

.msg.show { display: block; }
.msg.error { background: #2d0a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
.msg.success { background: #0a2d0f; border: 1px solid #14532d; color: #86efac; }

/* FILTERS */
.filter-section {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
  padding-bottom: 4px;
}

.filter-section.show { display: flex; }

.filter-btn {
  white-space: nowrap;
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 22px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
  min-height: 40px;
}

.filter-btn.active {
  border-color: transparent;
  color: #fff;
}

.service-filter {
  margin-top: 12px;
  display: none;
}

.service-filter.show { display: block; }

.service-filter label {
  font-size: 12px;
  font-weight: 700;
  color: #a78bfa;
  margin-bottom: 6px;
  display: block;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.service-filter select {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  cursor: pointer;
}


/* AUTOCOMPLETE ATENDIMENTO */
.service-filter { margin-top: 12px; display: none; }
.service-filter.show { display: block; }
.service-filter > label {
  font-size: 12px; font-weight: 700; color: #a78bfa;
  margin-bottom: 6px; display: block;
  text-transform: uppercase; letter-spacing: 1px;
}
.serv-row {
  position: relative;
  display: flex; align-items: center; gap: 6px;
}
.serv-input {
  flex: 1;
  padding: 12px 14px 12px 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-size: 15px; font-family: var(--font);
  outline: none; transition: border-color .2s;
}
.serv-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.serv-input::placeholder { color: var(--text-muted); }
.serv-icon {
  position: absolute; left: 12px;
  font-size: 15px; pointer-events: none;
}
.serv-mic-btn {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.serv-mic-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
.serv-mic-btn.listening {
  border-color: #ef4444;
  animation: mic-pulse 1s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); background: rgba(239,68,68,.1); }
  50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0); background: rgba(239,68,68,.2); }
}
.serv-dropdown {
  display: none; position: absolute;
  top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  max-height: 220px; overflow-y: auto;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.serv-dropdown.open { display: block; }
.serv-opt {
  padding: 10px 14px;
  font-size: 14px; color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(51,65,85,.5);
  transition: background .1s;
}
.serv-opt:last-child { border-bottom: none; }
.serv-opt:hover, .serv-opt.hi { background: var(--bg-surface); color: var(--text-primary); }
.serv-opt mark { background: rgba(99,102,241,.25); color: #a5b4fc; border-radius: 3px; padding: 0 2px; font-style: normal; }
.serv-opt-cnt { margin-left: auto; font-size: 11px; color: var(--text-muted); font-weight: 600; }
.serv-tag {
  display: none; margin-top: 8px;
  align-items: center; gap: 8px;
  background: rgba(99,102,241,.1);
  border: 1px solid rgba(99,102,241,.3);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px; color: #a5b4fc; font-weight: 600;
}
.serv-tag.show { display: flex; }
.serv-tag-x {
  margin-left: auto;
  background: rgba(99,102,241,.2); border: none;
  border-radius: 50%; width: 22px; height: 22px;
  color: #a5b4fc; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font);
}
.serv-tag-x:hover { background: rgba(99,102,241,.4); }




/* RESULTS COUNT */
.results-count {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 14px;
  padding-left: 2px;
}

.results-count span { color: #a78bfa; font-weight: 700; }

/* CARDS */
.results {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 14px;
}

.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
  position: relative;
  transition: all .2s;
}

.card:active { transform: translateY(-1px); }

.card.closest {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.card-closest-badge {
  position: absolute;
  top: 0;
  right: 0;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  padding: 4px 12px;
  border-bottom-left-radius: 10px;
  letter-spacing: 1.5px;
  display: none;
}

.card.closest .card-closest-badge { display: block; }

.card-header {
  display: flex;
  gap: 12px;
}

.card-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.card-body { flex: 1; min-width: 0; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.card-type {
  font-size: 11px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.card-dist {
  font-size: 15px;
  font-weight: 700;
  color: var(--amber);
}

.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-top: 6px;
  line-height: 1.3;
}

.card-addr {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 3px;
  line-height: 1.4;
}

.card-region {
  font-size: 12px;
  color: #a78bfa;
  margin-top: 3px;
  font-weight: 600;
}

.card-hours {
  font-size: 12px;
  color: #a78bfa;
  margin-top: 3px;
}

.card-services {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  line-height: 1.4;
}

.card-fav {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #94a3b8;
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  font-size: 20px;
  cursor: pointer;
  transition: all .2s;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-fav.favorited { background: #f59e0b; box-shadow: 0 0 12px rgba(245,158,11,.4); }
.card-fav:active { transform: scale(1.2); }

/* CARD ACTIONS */
.card-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}

.card-actions a, .card-actions button {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 42px;
  border: none;
  cursor: pointer;
  font-family: var(--font);
}

.btn-route { background: #312e81; color: #a5b4fc; }
.btn-phone { background: linear-gradient(135deg,#166534,#14532d); color: #86efac; }
.btn-share { background: rgba(37,211,102,.1); border: 1px solid #25d366; color: #25d366; }
.btn-details { background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.4); color: #c4b5fd; }

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 18px;
  padding: 14px 0;
}

.page-btn {
  padding: 12px 20px;
  border-radius: var(--radius);
  border: 2px solid var(--accent);
  background: linear-gradient(135deg, #312e81, #4c1d95);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  min-height: 48px;
  font-family: var(--font);
  transition: all .2s;
}

.page-btn:active { transform: scale(.96); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; border-color: var(--border); background: var(--bg-surface); }

.page-info {
  font-size: 14px;
  font-weight: 700;
  color: #a78bfa;
  min-width: 50px;
  text-align: center;
}

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.8);
  z-index: 100;
  overflow-y: auto;
  padding: 12px;
  backdrop-filter: blur(6px);
}

.overlay.show { display: block; }

.modal {
  max-width: 700px;
  margin: 0 auto;
  background: var(--bg-card);
  border-radius: 18px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.modal-header {
  padding: 20px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:active { background: var(--bg-surface); }

.modal-name {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.3;
  padding-right: 50px;
}

.modal-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-top: 8px;
}

.modal-info { padding: 0 20px 20px; }

.modal-section { margin-top: 16px; }

.modal-section-title {
  font-size: 12px;
  font-weight: 800;
  color: #a78bfa;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.modal-row {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  align-items: flex-start;
}

.modal-row-icon {
  font-size: 16px;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
}

.modal-row-text {
  font-size: 14px;
  color: #cbd5e1;
  line-height: 1.4;
}

.modal-row-label {
  font-weight: 700;
  color: var(--text-primary);
}

.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.modal-tag {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 8px;
  background: var(--bg-deep);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.modal-tag.highlight {
  background: rgba(139,92,246,.1);
  color: #c4b5fd;
  border-color: rgba(139,92,246,.3);
}

.modal-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

.modal-table th {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-align: left;
  padding: 6px 10px;
  background: var(--bg-deep);
  text-transform: uppercase;
  letter-spacing: .5px;
}

.modal-table td {
  font-size: 13px;
  color: #cbd5e1;
  padding: 6px 10px;
  border-top: 1px solid var(--border);
}

.modal-actions {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.modal-actions a {
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  text-align: center;
  font-family: var(--font);
}

/* FOOTER */
.footer {
  margin-top: 24px;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  display: none;
}

.footer.show { display: block; }

.footer-text {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* FAV FILTER TOGGLE */
.fav-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 8px 14px;
  background: rgba(253,230,138,.06);
  border: 1px solid rgba(253,230,138,.15);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: #fde68a;
  font-weight: 600;
  font-family: var(--font);
}

.fav-toggle.active { background: rgba(253,230,138,.15); border-color: rgba(253,230,138,.3); }

/* SCROLL TOP */
#topBtn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 14px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-size: 20px;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  cursor: pointer;
  z-index: 99;
}

#topBtn:active { transform: scale(.9); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 36px 20px;
  color: var(--text-muted);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 4px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }
.empty-state h3 { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; line-height: 1.6; color: var(--text-muted); }
.empty-state .empty-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 12px 0 4px; }
.empty-state .empty-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-secondary); }
.empty-state .empty-hint { font-size: 12px; color: #64748b; margin-top: 10px; }

@media (min-width: 640px) {
  .header { padding: 32px 20px 28px; }
  .header-brand { font-size: 18px; }
  .header-title { font-size: 28px; }
  .header-sub { font-size: 16px; }
  .container { padding: 20px; }
  .card-actions { grid-template-columns: repeat(4, 1fr); }
  .modal-actions { flex-direction: row; }
  .modal-actions a { flex: 1; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">Rede de Suporte ao Idoso</div>
    <h1 class="header-title">Encontre o Serviço Mais Próximo</h1>
    <p class="header-sub">IPGG "JOSÉ ERMÍRIO DE MORAES"</p>
    <div class="header-stats" id="stats"></div>
  </div>
</header>

<main class="container">
  <div class="search-box">
    <button class="gps-btn" id="gpsBtn" onclick="usarGPS()" aria-label="Usar localização GPS">
      📍 USAR MINHA LOCALIZAÇÃO
    </button>

    <div class="msg error" id="erro" role="alert"></div>
    <div class="msg success" id="found" role="status"></div>
  </div>

  <div class="filter-section" id="filtros" role="group" aria-label="Filtrar por tipo"></div>
  <div class="service-filter" id="sfilt">
    <label>🔬 Filtrar por Atendimento:</label>
    <div class="serv-row" id="servRow">
      <span class="serv-icon">🩺</span>
      <input id="servInput" class="serv-input" type="text"
        placeholder="Ex: fisioterapia, raio-x, fonoaudiologia..."
        autocomplete="off" aria-label="Buscar atendimento"
        oninput="onServInput()" onkeydown="onServKey(event)" onfocus="openDrop()">
      <button id="servMic" class="serv-mic-btn" onclick="toggleVoice()" aria-label="Buscar por voz" title="Buscar por voz">🎤</button>
      <div id="servDrop" class="serv-dropdown"></div>
    </div>
    <div id="servTag" class="serv-tag">
      <span id="servTagTxt"></span>
      <button class="serv-tag-x" onclick="clearServ()">✕</button>
    </div>
  </div>

  <button class="fav-toggle" id="favToggle" onclick="toggleFavFilter()">
    ⭐ Mostrar apenas favoritos

function saveFavs() { localStorage.setItem('ipgg_favs', JSON.stringify([...favs])); }

function toggleFav(idx) {
  if (favs.has(idx)) favs.delete(idx);
  else favs.add(idx);
  saveFavs();
  renderResults();
}

function toggleFavFilter() {
  showFavs = !showFavs;
  pag = 1;
  document.getElementById('favToggle').classList.toggle('active', showFavs);
  if(!tR) {
    tR = P.map((p,idx) => ({...p, _idx:idx, dist:null}));
    showFilters();
  }
  renderResults();
}

function dK(a,b,c,d) {
  const R=6371, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
  const z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));
}

function showErr(m) {
  const e=document.getElementById("erro");
  e.textContent=m;e.classList.add("show");
}

function clearErr() { document.getElementById("erro").classList.remove("show"); }

function mkRota(p) {
  let d = p.end + ", São Paulo, SP, Brasil";
  if (p.cep) d = p.end + ", CEP " + p.cep + ", São Paulo, SP, Brasil";
  const dest = encodeURIComponent(d);
  if (uC) return "https://www.google.com/maps/dir/?api=1&origin="+uC.lat+","+uC.lng+"&destination="+dest;
  return "https://www.google.com/maps/dir/?api=1&destination="+dest;
}

function mkWhats(p) {
  const txt = "Olha este local: *"+p.nome+"*\n📍 "+p.end+"\n📞 "+(p.tel||"Sem telefone")+"\n🕐 "+(p.hr||"")+"\n\nEncontrado no Buscador IPGG";
  return "https://wa.me/?text="+encodeURIComponent(txt);
}

}

}

function calc(lat,lng) {
  uC={lat,lng};
  tR=P.map((p,idx)=>({...p,_idx:idx,dist:dK(lat,lng,p.lat,p.lng)})).sort((a,b)=>a.dist-b.dist);
  fT="Todos";fS="";fR="Todas";pag=1;
  showFilters();
  renderResults();
}

function renderTypeFilters() {
  const e=document.getElementById("filtros");
  const ts=["Todos",...new Set(P.map(p=>p.tipo))];
  e.innerHTML=ts.map(t=>{
    const on=fT===t, c=COR[t]||"#6366f1", ic=ICO[t]||"";
    const n=t==="Todos"?getBase().length:getBase().filter(r=>r.tipo===t).length;
    return '<button class="filter-btn '+(on?'active':'')+'" style="'+(on?'background:'+c:'')+'" onclick="setType(\''+t.replace(/'/g,"\\'")+'\')">'+ic+' '+t+' ('+n+')</button>';
  }).join("");
  e.classList.add("show");
}

function setType(t) { pag=1; fT=t; fS=""; clearServ(); renderTypeFilters(); renderResults(); }

// Resolve sinônimo: retorna o serviço mapeado ou null
function resolverSinonimo(q) {
  if (!q) return null;
  const ql = q.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");  // remove acentos para comparação
  for (const [termo, servico] of Object.entries(SINONIMOS)) {
    const tl = termo.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (ql === tl || ql.includes(tl) || tl.includes(ql)) return servico;
  }
  return null;
}

function _servCounts(q) {
  const base = getBase();
  return _servs
    .filter(s => !q || s.toLowerCase().includes(q.toLowerCase()))
    .map(s => ({ n: s, c: base.filter(r => (r.serv||[]).includes(s)).length }))
    .filter(x => x.c > 0)
    .sort((a,b) => b.c - a.c);
}

}

function _esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function _renderDrop(q) {
  const dd = document.getElementById("servDrop");
  // Garante _servs preenchido mesmo sem GPS
  if (!_servs.length) { const all = new Set(); P.forEach(p => (p.serv||[]).forEach(x => all.add(x))); _servs = [...all].sort(); }
  const items = _servCounts(q).slice(0, 30);
  if (!items.length && q) {
    const sugestao = resolverSinonimo(q);
    if (sugestao) {
      // Há sinônimo — mostrar como sugestão clicável
      dd.innerHTML = '<div class="serv-opt" data-v="' + sugestao.replace(/"/g,"&quot;") + '" style="color:#a5b4fc">' +
        '<span>💡 Encontrado como: <b>' + sugestao + '</b></span>' +
        '</div>';
      dd.classList.add("open");
      dd.querySelector(".serv-opt").addEventListener("mousedown", function(e) {
        e.preventDefault(); selectServ(this.dataset.v);
      });
    } else {
      dd.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text-muted);text-align:center">' +
        'Nenhum atendimento encontrado para <b style="color:var(--text-secondary)">\"' + q + '\"</b>' +
        '</div>';
      dd.classList.add("open");
      setTimeout(function() {
        document.getElementById("servInput").value = "";
      }, 2500);
    }
    return;
  }
  if (!items.length) { dd.classList.remove("open"); return; }
  const rows = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    let lbl = it.n;
    if (q) lbl = lbl.replace(new RegExp("(" + _esc(q) + ")", "gi"), "<mark>$1</mark>");
    rows.push(
      '<div class="serv-opt" data-v="' + it.n.replace(/"/g,"&quot;") + '">' +
      '<span>' + lbl + '</span>' +
      '<span class="serv-opt-cnt">' + it.c + '</span>' +
      '</div>'
    );
  }
  dd.innerHTML = rows.join("");
  dd.classList.add("open");
  dd.querySelectorAll(".serv-opt").forEach(el => {
    el.addEventListener("mousedown", function(e) {
      e.preventDefault();
      selectServ(this.dataset.v);
    });
  });
}

function onServKey(e) {
  const dd = document.getElementById("servDrop");
  const opts = dd.querySelectorAll(".serv-opt");
  if (!dd.classList.contains("open")) { if (e.key === "ArrowDown") openDrop(); return; }
  if (e.key === "ArrowDown")  { e.preventDefault(); _di = Math.min(_di+1, opts.length-1); _hi(opts); }
  else if (e.key === "ArrowUp")   { e.preventDefault(); _di = Math.max(_di-1, -1); _hi(opts); }
  else if (e.key === "Enter" && _di >= 0) { e.preventDefault(); selectServ(opts[_di].dataset.v); }
  else if (e.key === "Escape") { dd.classList.remove("open"); }
}

function _hi(opts) {
  opts.forEach((o,i) => o.classList.toggle("hi", i === _di));
  if (_di >= 0) opts[_di].scrollIntoView({block:"nearest"});
}

function toggleVoice() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    alert("Reconhecimento de voz não disponível. Use Chrome ou Edge.");
    return;
  }
  _voiceOn ? stopVoice() : startVoice();
}

function startVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _recognition = new SR();
  _recognition.lang = "pt-BR";
  _recognition.interimResults = true;
  _recognition.maxAlternatives = 1;
  _voiceOn = true;
  document.getElementById("servMic").classList.add("listening");
  document.getElementById("servInput").placeholder = "🎤 Fale o atendimento...";

  _recognition.onresult = function(e) {
    var t = e.results[0][0].transcript;
    document.getElementById("servInput").value = t;
    _renderDrop(t);
  };
  _recognition.onend = function() {
    stopVoice();
    var q = document.getElementById("servInput").value.trim();
    if (q) {
      var m = _servs.filter(function(s){ return s.toLowerCase().includes(q.toLowerCase()); });
      if (m.length === 1) {
        selectServ(m[0]);
      } else {
        var sin = resolverSinonimo(q);
        if (sin) { selectServ(sin); } else { _renderDrop(q); }
      }
    }
  };
  _recognition.onerror = function() { stopVoice(); };
  _recognition.start();
}

function stopVoice() {
  _voiceOn = false;
  document.getElementById("servMic").classList.remove("listening");
  document.getElementById("servInput").placeholder = "Ex: fisioterapia, raio-x, fonoaudiologia...";
  if (_recognition) { try { _recognition.stop(); } catch(ex){} }
}

function getBase() {
  if(!tR) return [];
  let l=tR;
  if(fR!=="Todas") l=l.filter(r=>r.reg===fR);
  return l;
}

function getFiltered() {
  let l=getBase();
  if(fT!=="Todos") l=l.filter(r=>r.tipo===fT);
  if(fS) l=l.filter(r=>(r.serv||[]).includes(fS));
  if(showFavs) l=l.filter(r=>favs.has(r._idx));
  return l;
}

function renderResults() {
  const l=getFiltered(), e=document.getElementById("res"), rc=document.getElementById("rc");

  if(!l.length) {
    rc.innerHTML="";
    e.innerHTML = buildEmptyState();
    return;
  }

  const totalPag=Math.ceil(l.length/PP);
  if(pag>totalPag) pag=1;
  const ini=(pag-1)*PP, fim=ini+PP, lp=l.slice(ini,fim);

  rc.innerHTML='Mostrando <span>'+(ini+1)+'–'+Math.min(fim,l.length)+'</span> de '+l.length+' pontos · Página <span>'+pag+'</span> de '+totalPag;

  e.innerHTML=lp.map((p,i)=>{
    const idxGlobal=ini+i;
    const c=COR[p.tipo]||"#64748b", ic=ICO[p.tipo]||"📍";
    const isClosest=idxGlobal===0&&fT==="Todos"&&!fS&&fR==="Todas"&&!showFavs&&p.dist!==null;
    const isFav=favs.has(p._idx);
    const rt=mkRota(p), wt=mkWhats(p);
    const distStr=p.dist!==null?p.dist.toFixed(1)+' km':'';
    const tb=p.tel?'<a class="btn-phone" href="tel:'+p.tel.replace(/\D/g,'')+'">📞 '+p.tel+'</a>':'';
    const servPreview=p.serv&&p.serv.length>0?'<div class="card-services">🔬 '+p.serv.slice(0,3).join(' · ')+(p.serv.length>3?' +'+(p.serv.length-3)+' mais':'')+'</div>':'';
    const detailBtn=p.serv&&p.serv.length>0?'<button class="btn-details" onclick="openModal('+p._idx+')">ℹ️ Detalhes</button>':'';
    const hrStr=p.hr?'<div class="card-hours">🕐 '+p.hr+'</div>':'';

    return '<div class="card '+(isClosest?'closest':'')+'" role="listitem">'+
      '<div class="card-closest-badge">MAIS PRÓXIMO</div>'+
      '<button class="card-fav '+(isFav?'favorited':'')+'" onclick="toggleFav('+p._idx+')" aria-label="'+(isFav?'Remover dos favoritos':'Adicionar aos favoritos')+'">'+(isFav?'⭐':'☆')+'</button>'+
      '<div class="card-header">'+
        '<div class="card-icon" style="background:'+c+'18">'+ic+'</div>'+
        '<div class="card-body">'+
          '<div class="card-meta">'+
            '<span class="card-type" style="background:'+c+'25;color:'+c+'">'+p.tipo+'</span>'+
            (distStr?'<span class="card-dist">'+distStr+'</span>':'')+
          '</div>'+
          '<div class="card-name">'+p.nome+'</div>'+
          '<div class="card-addr">'+p.end+'</div>'+
          '<div class="card-region">📍 '+p.reg+'</div>'+
          hrStr+servPreview+
          '<div class="card-actions">'+
            '<a class="btn-route" href="'+rt+'" target="_blank">🗺️ Rota</a>'+
            tb+
            '<a class="btn-share" href="'+wt+'" target="_blank">📱 Enviar</a>'+
            detailBtn+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");

  if(totalPag>1) {
    e.innerHTML+='<div class="pagination">'+
      '<button class="page-btn" '+(pag===1?'disabled':'')+' onclick="goPage('+(pag-1)+')">← Anterior</button>'+
      '<span class="page-info">'+pag+' / '+totalPag+'</span>'+
      '<button class="page-btn" '+(pag===totalPag?'disabled':'')+' onclick="goPage('+(pag+1)+')">Próxima →</button>'+
    '</div>';
  }

  if(!navigator.geolocation) { showErr("GPS não disponível."); return; }
  const btn=document.getElementById("gpsBtn");
  btn.disabled=true; btn.textContent="📍 Localizando...";
  clearErr();
  navigator.geolocation.getCurrentPosition(
    p => {
      const f=document.getElementById("found");
      f.textContent="📍 Localização obtida via GPS";
      f.classList.add("show");
      calc(p.coords.latitude, p.coords.longitude);
      btn.disabled=false;
      btn.textContent="📍 USAR MINHA LOCALIZAÇÃO";
    },
    () => {
      showErr("Não foi possível obter localização. Verifique as permissões de GPS.");
      btn.disabled=false;
      btn.textContent="📍 USAR MINHA LOCALIZAÇÃO";
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}


function clearAll() {
  // Zera só os filtros — mantém GPS/localização
  fT = "Todos"; fS = ""; fR = "Todas"; pag = 1; showFavs = false;

  // UI filtros
  document.getElementById("favToggle").classList.remove("active");
  document.getElementById("servInput").value = "";
  document.getElementById("servDrop").classList.remove("open");
  document.getElementById("servTag").classList.remove("show");

  // Re-renderiza com localização preservada
  if (tR) {
    renderTypeFilters();
    renderResults();
  }
}



function buildEmptyState() {
  // Monta lista de filtros ativos
  var tags = [];
  if (fT !== "Todos")  tags.push("Tipo: " + fT);
  if (fS)              tags.push("Atendimento: " + fS);
  if (fR !== "Todas")  tags.push("Região: " + fR);
  if (showFavs)        tags.push("Apenas favoritos");

  if (showFavs && !tags.filter(function(t){return t!=="Apenas favoritos";}).length) {
    return '<div class="empty-state">' +
      '<div class="icon">⭐</div>' +
      '<h3>Nenhum favorito salvo</h3>' +
      '<p>Toque no ☆ de qualquer serviço para adicioná-lo aos favoritos.</p>' +
      '</div>';
  }

  var tagsHtml = "";
  if (tags.length) {
    tagsHtml = '<div class="empty-tags">' +
      tags.map(function(t){ return '<span class="empty-tag">' + t + '</span>'; }).join("") +
      '</div>';
  }

  var hint = tags.length
    ? '<p class="empty-hint">Tente remover um dos filtros acima ou clique em <b>Limpar todos os filtros</b>.</p>'
    : '<p class="empty-hint">Use o GPS ou busque por nome para encontrar serviços próximos.</p>';

  return '<div class="empty-state">' +
    '<div class="icon">🔍</div>' +
    '<h3>Nenhum serviço encontrado</h3>' +
    (tags.length ? '<p>Não há resultados com os filtros selecionados:</p>' + tagsHtml : '<p>Nenhuma unidade disponível no momento.</p>') +
    hint +
    '</div>';
}

// Init
updStats();
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

// Top button
const topBtn=document.createElement("button");
topBtn.id="topBtn";
topBtn.innerHTML="⬆";
topBtn.setAttribute("aria-label","Voltar ao topo");
topBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
document.body.appendChild(topBtn);
window.addEventListener("scroll",()=>{topBtn.style.display=window.scrollY>400?"flex":"none"});

// PWA
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW ok')).catch(e=>console.log('SW erro',e));
}
</script>
