<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IPGG Rede">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>IPGG - Rede de Suporte ao Idoso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#0a0f1a;
  color:#e2e8f0;
  font-family:'DM Sans',system-ui,sans-serif
}

/* TOPO — layout antigo com letras um pouco maiores */
.hd{
  background:linear-gradient(135deg,#1a237e 0%,#6a1b9a 100%);
  padding:28px 20px 24px;
  position:relative;
  overflow:hidden
}

.hd::after{
  content:'';
  position:absolute;
  top:-50%;
  right:-20%;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);
  border-radius:50%
}

.hd-in{
  max-width:960px;
  margin:0 auto;
  position:relative;
  z-index:1
}

.hd-tag{
  font-size:48px;
  font-weight:800;
  letter-spacing:2.5px;
  color:#00FF00;
  margin-bottom:6px;
  text-transform:uppercase;
  text-align: center
}

.hd-t{
  font-size:36px;
  font-weight:800;
  color:#fff;
  line-height:1.2;
  text-align: center
}

.hd-s{
  font-size:26px;
  color:#d1c4e9;
  margin-top:6px;
  text-align: center
}

/* Stats simples, sem mudar muito o layout antigo */
.stats{
  display:flex;
  gap:35px;
  margin-top:12px;
  flex-wrap:wrap;
  justify-content:center
}

.stat{
  font-size:20px;
  color:#FFDE21;
  background:rgba(255, 255, 224, 0.1);
  border:1px solid rgba(255, 255, 224, 0.4);
  border-radius:20px;
  padding:4px 10px;
  font-weight:600
}

.stat b{
  color:#FFDE21
}

.ct{
  max-width:960px;
  margin:0 auto;
  padding:24px 20px
}

.sb{
  background:#141b2d;
  border-radius:16px;
  padding:18px;
  border:1px solid #1e293b
}

.sb-l{
  font-size:20px;
  font-weight:700;
  color:#94a3b8;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.5px
}

.sb-icon{
  display:none
}

.sb-i{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0a0f1a;
  color:#e2e8f0;
  font-size:20px;
  outline:none;
  transition:border .2s
}

.sb-i:focus{
  border-color:#7c3aed
}

.sb-i::placeholder{
  color:#475569
}

.br{
  display:flex;
  gap:8px;
  margin-top:10px
}

.bb{
  flex:1;
  padding:12px 0;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#1a237e,#6a1b9a);
  color:#fff;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .2s
}

.bb:hover{
  opacity:.9
}

.bb:disabled{
  opacity:.5;
  cursor:wait
}

.bg{
  padding:12px 16px;
  border-radius:10px;
  border:1px solid #334155;
  background:#141b2d;
  color:#b39ddb;
  font-size:18px;
  font-weight:600;
  cursor:pointer
}

.er{
  margin-top:10px;
  padding:9px 12px;
  border-radius:8px;
  background:#2d0a0a;
  border:1px solid #7f1d1d;
  color:#fca5a5;
  font-size:13px;
  display:none
}

.er.sh{
  display:block
}

.fa{
  margin-top:10px;
  padding:9px 12px;
  border-radius:8px;
  background:#0a2d0f;
  border:1px solid #14532d;
  color:#86efac;
  font-size:12px;
  display:none
}

.fa.sh{
  display:block
}

/* Filtro por região — estilo compatível com o layout antigo */
.rg{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:16px;
  display:none
}

.rg.sh{
  display:flex
}

.rg-b{
  padding:5px 12px;
  border-radius:20px;
  border:1px solid #1e293b;
  background:transparent;
  color:#94a3b8;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s
}

.rg-b.on{
  border:none;
  color:#fff;
  background:linear-gradient(135deg,#1a237e,#6a1b9a)
}

/* Filtros antigos */
.fl{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
  display:none
}

.fl.sh{
  display:flex
}

.fb{
  padding:5px 12px;
  border-radius:20px;
  border:1px solid #1e293b;
  background:transparent;
  color:#94a3b8;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s
}

.fb.on{
  border:none;
  color:#fff
}

.sf{
  margin-top:12px;
  display:none
}

.sf.sh{
  display:block
}

.sf select{
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0a0f1a;
  color:#e2e8f0;
  font-size:13px;
  outline:none;
  cursor:pointer
}

.sf-l{
  font-size:10px;
  font-weight:700;
  color:#b39ddb;
  margin-bottom:6px;
  display:block;
  text-transform:uppercase;
  letter-spacing:1px
}

.rc{
  font-size:11px;
  color:#64748b;
  margin-top:14px;
  padding-left:2px
}

.rc span{
  color:#b39ddb;
  font-weight:700
}

.rs{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:16px
}

.cd{
  background:#141b2d;
  border-radius:14px;
  padding:14px 16px;
  border:1px solid #1e293b;
  position:relative;
  transition:all .25s
}

.cd:hover{
  border-color:#334155;
  transform:translateY(-1px)
}

.cd.p1{
  border-color:#7c3aed;
  box-shadow:0 0 20px rgba(124,58,237,.12)
}

.bp{
  position:absolute;
  top:0;
  right:0;
  background:linear-gradient(135deg,#1a237e,#6a1b9a);
  color:#fff;
  font-size:8px;
  font-weight:800;
  padding:3px 10px;
  border-bottom-left-radius:10px;
  letter-spacing:1.5px;
  display:none
}

.cd.p1 .bp{
  display:block
}

.ci{
  display:flex;
  gap:12px
}

.ck{
  width:38px;
  height:38px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  flex-shrink:0
}

.cb{
  flex:1;
  min-width:0
}

.cm{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap
}

.ct2{
  font-size:9px;
  font-weight:800;
  padding:2px 8px;
  border-radius:6px;
  text-transform:uppercase;
  letter-spacing:.8px
}

.dst{
  font-size:13px;
  font-weight:700;
  color:#fbbf24
}

.cn{
  font-size:14px;
  font-weight:700;
  color:#f1f5f9;
  margin-top:5px;
  line-height:1.3
}

.ce{
  font-size:12px;
  color:#94a3b8;
  margin-top:3px
}

.creg{
  font-size:10px;
  color:#b39ddb;
  margin-top:3px;
  font-weight:600
}

.ch{
  font-size:11px;
  color:#b39ddb;
  margin-top:3px
}

.csp{
  font-size:11px;
  color:#64748b;
  margin-top:6px;
  line-height:1.4
}

.cbt{
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap:wrap
}

.bm{
  padding:5px 12px;
  border-radius:8px;
  background:#1a237e;
  color:#fff;
  font-size:11px;
  font-weight:700;
  text-decoration:none;
  display:inline-block
}

.bt{
  padding:5px 12px;
  border-radius:8px;
  background:#064e3b33;
  border:1px solid #065f46;
  color:#34d399;
  font-size:11px;
  font-weight:700;
  text-decoration:none;
  display:inline-block
}

.bw{
  padding:5px 12px;
  border-radius:8px;
  background:#075e2533;
  border:1px solid #25d366;
  color:#25d366;
  font-size:11px;
  font-weight:700;
  text-decoration:none;
  display:inline-block
}

.bs{
  padding:5px 12px;
  border-radius:8px;
  background:#6a1b9a22;
  border:1px solid #6a1b9a;
  color:#ce93d8;
  font-size:11px;
  font-weight:700;
  text-decoration:none;
  display:inline-block;
  cursor:pointer
}

.bs:hover{
  background:#6a1b9a44
}

/* Modal antigo */
.ov{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.75);
  z-index:100;
  overflow-y:auto;
  padding:20px;
  backdrop-filter:blur(4px)
}

.ov.sh{
  display:block
}

.dt{
  max-width:720px;
  margin:0 auto;
  background:#141b2d;
  border-radius:18px;
  border:1px solid #1e293b;
  overflow:hidden
}

.dt-hd{
  padding:20px;
  position:relative
}

.dt-x{
  position:absolute;
  top:14px;
  right:14px;
  width:34px;
  height:34px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0a0f1a;
  color:#e2e8f0;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center
}

.dt-x:hover{
  background:#1e293b
}

.dt-nm{
  font-size:18px;
  font-weight:800;
  color:#f1f5f9;
  line-height:1.3;
  padding-right:44px
}

.dt-bd{
  display:inline-block;
  font-size:9px;
  font-weight:800;
  padding:3px 10px;
  border-radius:6px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-top:8px
}

.dt-info{
  padding:0 20px 20px
}

.dt-sec{
  margin-top:16px
}

.dt-st{
  font-size:10px;
  font-weight:800;
  color:#b39ddb;
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:8px;
  padding-bottom:4px;
  border-bottom:1px solid #1e293b
}

.dt-row{
  display:flex;
  gap:8px;
  padding:5px 0;
  align-items:flex-start
}

.dt-ri{
  font-size:14px;
  width:20px;
  text-align:center;
  flex-shrink:0;
  margin-top:1px
}

.dt-rt{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.4
}

.dt-rl{
  font-weight:700;
  color:#f1f5f9
}

.dt-tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:4px
}

.dt-tag{
  font-size:10px;
  padding:4px 10px;
  border-radius:8px;
  background:#0a0f1a;
  color:#94a3b8;
  border:1px solid #1e293b
}

.dt-tag.h{
  background:#6a1b9a22;
  color:#ce93d8;
  border-color:#6a1b9a55
}

.dt-tbl{
  width:100%;
  border-collapse:collapse;
  margin-top:6px
}

.dt-tbl th{
  font-size:9px;
  font-weight:700;
  color:#94a3b8;
  text-align:left;
  padding:5px 8px;
  background:#0a0f1a;
  text-transform:uppercase;
  letter-spacing:.5px
}

.dt-tbl td{
  font-size:11px;
  color:#cbd5e1;
  padding:4px 8px;
  border-top:1px solid #1e293b
}

.dt-act{
  padding:16px 20px;
  border-top:1px solid #1e293b;
  display:flex;
  gap:8px;
  flex-wrap:wrap
}

.dt-act a{
  padding:10px 18px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  flex:1;
  min-width:110px
}

.ft{
  margin-top:28px;
  padding:14px 0;
  border-top:1px solid #1e293b;
  text-align:center;
  display:none
}

.ft.sh{
  display:block
}

.ft-t{
  font-size:10px;
  color:#475569;
  line-height:1.6
}

/* Autocomplete antigo */
.ac{
  position:relative
}

.ac-list{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#141b2d;
  border:1px solid #334155;
  border-top:none;
  border-radius:0 0 12px 12px;
  max-height:220px;
  overflow-y:auto;
  z-index:50;
  display:none
}

.ac-list.sh{
  display:block
}

.ac-item{
  padding:10px 14px;
  font-size:13px;
  color:#cbd5e1;
  cursor:pointer;
  border-bottom:1px solid #1e293b;
  line-height:1.4
}

.ac-item:hover,
.ac-item.sel{
  background:#1e293b;
  color:#fff
}

.ac-item:last-child{
  border-bottom:none;
  border-radius:0 0 12px 12px
}

.ac-item small{
  display:block;
  font-size:10px;
  color:#64748b;
  margin-top:2px
}

.ac-load{
  padding:12px 14px;
  font-size:12px;
  color:#64748b;
  text-align:center
}


/* ============================================
   VERSÃO MOBILE — otimizada para idosos
   ============================================ */

/* Layout geral */
.ct{
  max-width:100%;
  padding:12px 14px
}

.hd{
  padding:16px 14px 14px
}

.hd-in{
  max-width:100%
}

.hd-tag{
  font-size:20px;
  letter-spacing:1px
}

.hd-t{
  font-size:20px
}

.hd-s{
  font-size:16px
}

.stats{
  gap:8px;
  flex-wrap:wrap
}

.stat{
  font-size:14px;
  padding:4px 10px
}

/* ===== BUSCA — GPS em destaque ===== */
.sb{
  padding:16px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  gap:12px
}

.sb-l{
  display:none
}

.bg-mob{
  width:100%;
  padding:18px 20px;
  font-size:20px;
  font-weight:700;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#1565c0,#0d47a1);
  color:#fff;
  cursor:pointer;
  min-height:60px;
  letter-spacing:.3px;
  box-shadow:0 4px 15px rgba(21,101,192,.4);
  transition:all .2s
}

.bg-mob:active{
  transform:scale(.97);
  opacity:.9
}

.sb-div{
  text-align:center;
  color:#64748b;
  font-size:14px;
  padding:4px 0;
  position:relative
}

.sb-div::before,.sb-div::after{
  content:"";
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:#334155
}

.sb-div::before{left:0}
.sb-div::after{right:0}

.sb-i{
  font-size:18px;
  padding:14px 14px;
  min-height:52px;
  border-radius:14px;
  width:100%;
  box-sizing:border-box
}

.br{
  display:contents
}

.bb{
  width:100%;
  padding:16px 0;
  font-size:18px;
  border-radius:14px;
  min-height:52px
}

.bg{
  display:none
}

/* Erro e endereço encontrado */
.er{
  font-size:15px;
  padding:12px 14px;
  border-radius:10px
}

.fa{
  font-size:15px;
  padding:12px 14px;
  border-radius:10px
}

/* ===== FILTROS — scroll horizontal com toque ===== */
.rg,.fl{
  flex-wrap:nowrap;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:4px;
  gap:8px;
  justify-content:flex-start
}

.rg::-webkit-scrollbar,.fl::-webkit-scrollbar{
  display:none
}

.rg-b{
  white-space:nowrap;
  flex-shrink:0;
  padding:10px 16px;
  font-size:15px;
  border-radius:25px;
  min-height:44px;
  line-height:1.3
}

.fb{
  white-space:nowrap;
  flex-shrink:0;
  padding:10px 14px;
  font-size:14px;
  border-radius:25px;
  min-height:44px;
  line-height:1.3
}

/* Select de serviço */
.sf select{
  font-size:16px;
  padding:14px 14px;
  min-height:48px;
  border-radius:12px
}

.sf-l{
  font-size:14px;
  margin-bottom:6px
}

/* Contagem */
.rc{
  font-size:15px;
  margin-top:14px;
  padding-left:4px
}

/* ===== CARDS ===== */
.rs{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:14px
}

.cd{
  padding:16px 14px;
  border-radius:14px
}

.ck{
  width:44px;
  height:44px;
  font-size:22px;
  border-radius:10px
}

.ct2{
  font-size:12px;
  padding:4px 10px;
  border-radius:8px
}

.dst{
  font-size:16px;
  font-weight:700
}

.cn{
  font-size:18px;
  margin-top:6px;
  line-height:1.3
}

.ce{
  font-size:15px;
  margin-top:4px;
  line-height:1.4
}

.creg{
  font-size:14px;
  margin-top:4px
}

.ch{
  font-size:14px;
  margin-top:4px
}

.csp{
  font-size:14px;
  margin-top:8px
}

.bp{
  font-size:11px;
  padding:5px 12px;
  border-bottom-left-radius:12px
}

/* Botões de ação — grid 2x2 grandes */
.cbt{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px
}

.bm,.bt,.bw,.bs{
  padding:14px 10px;
  border-radius:12px;
  font-size:15px;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:600
}

/* Botão telefone em destaque — verde */
.bt{
  background:linear-gradient(135deg,#2e7d32,#1b5e20)!important;
  color:#fff!important;
  border-color:#2e7d32!important;
  font-size:16px
}

/* ===== PAGINAÇÃO ===== */
.pgn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:18px;
  padding:14px 0
}

.pgb{
  padding:14px 22px;
  border-radius:14px;
  border:2px solid #7c3aed;
  background:linear-gradient(135deg,#1a237e,#6a1b9a);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  min-height:52px;
  min-width:120px;
  transition:all .2s;
  font-family:inherit
}

.pgb:active{
  transform:scale(.96)
}

.pgb:disabled{
  opacity:.35;
  cursor:not-allowed;
  border-color:#334155;
  background:#1e293b
}

.pginfo{
  font-size:16px;
  font-weight:700;
  color:#b39ddb;
  padding:0 6px;
  min-width:50px;
  text-align:center
}

/* ===== MODAL ===== */
.ov{
  padding:8px
}

.dt{
  max-width:100%;
  border-radius:16px
}

.dt-nm{
  font-size:20px;
  padding-right:50px
}

.dt-bd{
  font-size:12px;
  padding:5px 12px
}

.dt-st{
  font-size:13px;
  margin-bottom:10px
}

.dt-rt{
  font-size:15px
}

.dt-tag{
  font-size:13px;
  padding:6px 12px
}

.dt-tbl th{
  font-size:12px;
  padding:8px 10px
}

.dt-tbl td{
  font-size:14px;
  padding:8px 10px
}

.dt-act{
  flex-direction:column;
  gap:8px
}

.dt-act a{
  padding:16px 20px;
  font-size:17px;
  min-height:52px;
  width:100%;
  text-align:center;
  border-radius:12px
}

.dt-x{
  width:48px;
  height:48px;
  font-size:24px
}

/* ===== AUTOCOMPLETE ===== */
.ac-item{
  padding:14px 14px;
  font-size:15px

const COR={Instituto:"#c62828",Hospital:"#e53935",UPA:"#ff5722","AMA/UBS":"#0288d1",CAPS:"#7b1fa2",UBS:"#1565c0",CEO:"#00897b",CER:"#5c6bc0",CEU:"#00695c",CRAS:"#e65100",CREAS:"#d84315",CCI:"#ad1457",INSS:"#37474f","Alimentação":"#f57f17",Cultura:"#2e7d32",Social:"#00838f",Parque:"#388e3c"};
const ICO={Instituto:"🏥",Hospital:"🏨",UPA:"🚨","AMA/UBS":"🚑",CAPS:"🧠",UBS:"🩺",CEO:"🦷",CER:"♿",CEU:"🎭",CRAS:"🤲",CREAS:"🛡️",CCI:"👴",INSS:"🏛️","Alimentação":"🍽️",Cultura:"📚",Social:"🤝",Parque:"🌳"};

let uC=null,tR=null,fT="Todos",fS="",fR="Todas",pag=1;
const PP=10;

function dK(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function sE(m){const e=document.getElementById("erro");e.textContent=m;e.classList.add("sh")}
function cE(){document.getElementById("erro").classList.remove("sh")}

function mkRota(p){
  var destTxt=p.end+", São Paulo, SP, Brasil";
  if(p.cep) destTxt=p.end+", CEP "+p.cep+", São Paulo, SP, Brasil";
  var dest=encodeURIComponent(destTxt);
  if(uC){
    var orig=uC.lat+","+uC.lng;
    return "https://www.google.com/maps/dir/?api=1&origin="+orig+"&destination="+dest;
  }
  return "https://www.google.com/maps/dir/?api=1&destination="+dest;
}

function mkWhats(p){
  var txt="Olha este local: *"+p.nome+"*\n📍 "+p.end+"\n📞 "+(p.tel||"Sem telefone")+"\n🕐 "+(p.hr||"")+"\n\nEncontrado no Buscador IPGG";
  return "https://wa.me/?text="+encodeURIComponent(txt);
}

function updStats(){
  const e=document.getElementById("stats");
  const regs=[...new Set(P.map(p=>p.reg))];
  const saude=P.filter(p=>["UBS","AMA/UBS","Hospital","Instituto","CAPS","UPA","CEO","CER"].includes(p.tipo)).length;
  e.innerHTML=`<div class="stat"><b>${P.length}</b> Serviços</div><div class="stat"><b>${saude}</b> Área Saúde</div>`;
}
updStats();

function calc(lat,lng){uC={lat,lng};tR=P.map((p,idx)=>({...p,_idx:idx,dist:dK(lat,lng,p.lat,p.lng)})).sort((a,b)=>a.dist-b.dist);fT="Todos";fS="";fR="Todas";pag=1;rReg();rF();rSF();rR();document.getElementById("footer").classList.add("sh")}

function rReg(){
  const e=document.getElementById("regioes");
  const regs=["Todas",...new Set(P.map(p=>p.reg))];
  e.innerHTML=regs.map(r=>{
    const on=fR===r;
    const n=r==="Todas"?tR.length:tR.filter(x=>x.reg===r).length;
    return`<button class="rg-b ${on?'on':''}" onclick="sR('${r}')">📍 ${r} (${n})</button>`;
  }).join("");
  e.classList.add("sh");
}

function sR(r){pag=1;fR=r;rReg();rF();rR()}

function rF(){const e=document.getElementById("filtros"),ts=["Todos",...new Set(P.map(p=>p.tipo))];e.innerHTML=ts.map(t=>{const on=fT===t,c=COR[t]||"#1565c0",ic=ICO[t]||"";
const n=t==="Todos"?gBase().length:gBase().filter(r=>r.tipo===t).length;
return`<button class="fb ${on?'on':''}" style="${on?'background:'+c:''}" onclick="sF('${t}')">${ic} ${t} (${n})</button>`}).join("");e.classList.add("sh")}

function rSF(){const e=document.getElementById("sfilt"),s=document.getElementById("ssel"),all=new Set();tR.forEach(p=>(p.serv||[]).forEach(x=>all.add(x)));s.innerHTML='<option value="">Todos os serviços</option>'+[...all].sort().map(x=>`<option value="${x}">${x}</option>`).join("");e.classList.add("sh")}

function sF(t){pag=1;fT=t;rF();rR()}
function filtS(){pag=1;fS=document.getElementById("ssel").value;rR()}

function gBase(){let l=tR;if(fR!=="Todas")l=l.filter(r=>r.reg===fR);return l}
function gL(){let l=gBase();if(fT!=="Todos")l=l.filter(r=>r.tipo===fT);if(fS)l=l.filter(r=>(r.serv||[]).includes(fS));return l}

function rR(){const l=gL(),e=document.getElementById("res"),rc=document.getElementById("rc");
if(!l.length){rc.innerHTML="";e.innerHTML='<div style="text-align:center;padding:30px;color:#64748b;font-size:13px">Nenhuma unidade encontrada com esse filtro.</div>';return}
const totalPag=Math.ceil(l.length/PP);
if(pag>totalPag)pag=1;
const ini=(pag-1)*PP,fim=ini+PP,lp=l.slice(ini,fim);
rc.innerHTML=`Mostrando <span>${ini+1}–${Math.min(fim,l.length)}</span> de ${l.length} pontos · Página <span>${pag}</span> de ${totalPag}`;
e.innerHTML=lp.map((p,i)=>{const idxGlobal=ini+i;const c=COR[p.tipo]||"#64748b",ic=ICO[p.tipo]||"📍",p1=idxGlobal===0&&fT==="Todos"&&!fS&&fR==="Todas";
const rt=mkRota(p);const wt=mkWhats(p);
const tb=p.tel?`<a class="bt" href="tel:${p.tel.replace(/\D/g,"")}">${p.tel}</a>`:"";
const td=p.serv&&p.serv.length>0;
const sb=td?`<span class="bs" onclick="oD(${p._idx})">ℹ️ Detalhes</span>`:"";
const sp=td?`<div class="csp">🔬 ${p.serv.slice(0,3).join(" · ")}${p.serv.length>3?" +"+(p.serv.length-3)+" mais":""}</div>`:"";
const hr=p.hr?`<div class="ch">🕐 ${p.hr}</div>`:"";
return`<div class="cd ${p1?'p1':''}"><div class="bp">MAIS PRÓXIMO</div><div class="ci"><div class="ck" style="background:${c}18">${ic}</div><div class="cb"><div class="cm"><span class="ct2" style="background:${c}30;color:${c}">${p.tipo}</span><span class="dst">${p.dist.toFixed(1)} km</span></div><div class="cn">${p.nome}</div><div class="ce">${p.end}</div><div class="creg">📍 ${p.reg}</div>${hr}${sp}<div class="cbt"><a class="bm" href="${rt}" target="_blank">🗺️ Rota</a>${tb}<a class="bw" href="${wt}" target="_blank">📱 Enviar</a>${sb}</div></div></div></div>`}).join("");
if(totalPag>1){
  let pgHtml='<div class="pgn">';
  pgHtml+=`<button class="pgb" ${pag===1?'disabled':''} onclick="mudaPag(${pag-1})">← Anterior</button>`;
  pgHtml+=`<span class="pginfo">${pag} / ${totalPag}</span>`;
  pgHtml+=`<button class="pgb" ${pag===totalPag?'disabled':''} onclick="mudaPag(${pag+1})">Próxima →</button>`;
  pgHtml+='</div>';
  e.innerHTML+=pgHtml;
}}

function mudaPag(n){pag=n;rR();window.scrollTo({top:document.querySelector(".sb").offsetTop-10,behavior:"smooth"})}

function oD(idx){const p=P[idx],c=COR[p.tipo]||"#64748b",ic=ICO[p.tipo]||"📍";
const rt=mkRota(p);const wt=mkWhats(p);
let h=`<div class="dt-hd" style="background:linear-gradient(135deg,${c}15,${c}08)"><button class="dt-x" onclick="fD()">&times;</button><div style="font-size:26px;margin-bottom:8px">${ic}</div><div class="dt-nm">${p.nome}</div><span class="dt-bd" style="background:${c}30;color:${c}">${p.tipo}</span><span class="dt-bd" style="background:#1e293b;color:#b39ddb;margin-left:4px">📍 ${p.reg}</span></div><div class="dt-info">`;

if(uC){const dist=dK(uC.lat,uC.lng,p.lat,p.lng);h+=`<div class="dt-row"><div class="dt-ri">📏</div><div class="dt-rt"><span class="dt-rl">Distância:</span> ${dist.toFixed(1)} km (linha reta)</div></div>`}
h+=`</div>`;
if(p.serv&&p.serv.length)h+=`<div class="dt-sec"><div class="dt-st">🔬 Serviços</div><div class="dt-tags">${p.serv.map(s=>`<span class="dt-tag h">${s}</span>`).join("")}</div></div>`;

if(p.extra)h+=`<div class="dt-sec"><div class="dt-st">✨ Extras</div><div class="dt-rt" style="font-size:12px;line-height:1.5;color:#94a3b8">${p.extra}</div></div>`;

if(p.tel)h+=`<a href="tel:${p.tel.replace(/\D/g,"")}" style="background:#1b5e20;color:#81c784;border:1px solid #2e7d32">📞 Ligar</a>`;

h+=`</div>`;document.getElementById("dt").innerHTML=h;document.getElementById("ov").classList.add("sh");document.body.style.overflow="hidden"}

function fD(){document.getElementById("ov").classList.remove("sh");document.body.style.overflow=""}

function usarGPS(){if(!navigator.geolocation){sE("GPS não disponível.");return}const btn=document.querySelector(".bg-mob");btn.disabled=true;btn.textContent="📍 Localizando...";cE();navigator.geolocation.getCurrentPosition(p=>{const f=document.getElementById("found");f.textContent="📍 Localização obtida via GPS";f.classList.add("sh");calc(p.coords.latitude,p.coords.longitude);btn.disabled=false;btn.textContent="📍 USAR MINHA LOCALIZAÇÃO (GPS)"},()=>{sE("Não foi possível obter localização. Verifique as permissões de GPS.");btn.disabled=false;btn.textContent="📍 USAR MINHA LOCALIZAÇÃO (GPS)"},{enableHighAccuracy:true,timeout:10000})}

document.addEventListener("keydown",e=>{if(e.key==="Escape")fD()});

// Botão voltar ao topo
const topBtn=document.createElement("button");
topBtn.id="topBtn";
topBtn.innerHTML="⬆";
topBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
document.body.appendChild(topBtn);
window.addEventListener("scroll",()=>{topBtn.style.display=window.scrollY>400?"flex":"none"});

}
